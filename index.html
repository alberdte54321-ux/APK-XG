<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>APKs actualizados, G X G</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Courier New', monospace;
      background: #000;
      color: #0f0;
      overflow-x: hidden;
    }

    /* Fondo Matrix */
    canvas {
      position: fixed;
      top: 0; left: 0;
      z-index: -1;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      background: rgba(0,0,0,0.7);
      border-bottom: 2px solid #0f0;
      position: relative;
      z-index: 10;
    }

    h1 {
      margin: 0;
      font-size: 3.5em;
      text-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
      animation: glow 2s infinite alternate;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: rgba(0,20,0,0.6);
      border: 1px solid #0f0;
      border-radius: 10px;
      box-shadow: 0 0 30px #0f0;
    }

    .section {
      margin-bottom: 40px;
    }

    h2 {
      color: #0f0;
      border-bottom: 2px solid #0f0;
      padding-bottom: 10px;
      text-shadow: 0 0 8px #0f0;
    }

    .apk-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: rgba(0,50,0,0.4);
      margin: 10px 0;
      border-left: 5px solid #0f0;
      transition: all 0.3s;
    }

    .apk-item:hover {
      background: rgba(0,80,0,0.6);
      transform: scale(1.02);
      box-shadow: 0 0 15px #0f0;
    }

    .apk-name { font-weight: bold; font-size: 1.3em; }
    .apk-version { color: #0f0; opacity: 0.8; }
    .apk-date { font-size: 0.9em; color: #0f0; }

    a {
      background: #0f0;
      color: #000;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover { background: #00ff00; box-shadow: 0 0 15px #00ff00; }

    @keyframes glow {
      from { text-shadow: 0 0 10px #0f0; }
      to   { text-shadow: 0 0 30px #0f0, 0 0 50px #0f0; }
    }
  </style>
</head>
<body>

<canvas id="matrix"></canvas>

<header>
  <h1>APKs actualizados, G X G</h1>
</header>

<div class="container">
  <div class="section">
    <h2>Juegos</h2>
    <div class="apk-item">
      <div>
        <span class="apk-name">Genshin Impact</span><br>
        <span class="apk-version">v4.8.0</span> • <span class="apk-date">17 feb 2026</span>
      </div>
      <a href="https://tu-enlace.com/genshin.apk" target="_blank">Descargar</a>
    </div>
    <!-- Añade más aquí -->
  </div>

  <div class="section">
    <h2>Redes Sociales</h2>
    <div class="apk-item">
      <div>
        <span class="apk-name">WhatsApp Plus</span><br>
        <span class="apk-version">v2.24.10</span> • <span class="apk-date">16 feb 2026</span>
      </div>
      <a href="https://tu-enlace.com/whatsapp.apk" target="_blank">Descargar</a>
    </div>
  </div>

  <div class="section">
    <h2>Herramientas</h2>
    <div class="apk-item">
      <div>
        <span class="apk-name">Termux</span><br>
        <span class="apk-version">v0.119</span> • <span class="apk-date">15 feb 2026</span>
      </div>
      <a href="https://tu-enlace.com/termux.apk" target="_blank">Descargar</a>
    </div>
  </div>
</div>

<script>
// Fondo Matrix
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%^&*()_+-=[]|;:,.<>?';
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];
for (let x = 0; x < columns; x++) drops = 1;

function draw() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#0f0';
  ctx.font = fontSize + 'px monospace';

  for (let i = 0; i < drops.length; i++) {
    const text = chars.charAt(Math.floor(Math.random() * chars.length));
    const x = i * fontSize;
    const y = drops * fontSize;

    ctx.fillText(text, x, y);

    if (y > canvas.height && Math.random() > 0.975) drops = 0;
    drops ++;
  }
}

setInterval(draw, 35);

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
