<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APKs actualizados, G X G</title>
  <style>
    body { margin:0; padding:0; background:#000; overflow:hidden; }
    canvas { position:fixed; top:0; left:0; }
    .title { position:absolute; top:20px; width:100%; text-align:center; color:#0f0; font-family:monospace; font-size:3em; text-shadow:0 0 10px #0f0; z-index:10; }
    .container { position:absolute; top:100px; left:50%; transform:translateX(-50%); max-width:800px; color:#0f0; font-family:monospace; background:rgba(0,20,0,0.6); padding:20px; border:2px solid #0f0; z-index:10; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="title">APKs actualizados, G X G</div>

  <div class="container">
    <h2>Juegos</h2>
    <p>Genshin Impact v4.8.0 • 17 feb 2026 → <a href="TU-ENLACE" style="color:#0f0;">Descargar</a></p>

    <h2>Redes</h2>
    <p>WhatsApp Plus v2.24.10 • 16 feb 2026 → <a href="TU-ENLACE" style="color:#0f0;">Descargar</a></p>
  </div>

  <script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    c.height = window.innerHeight;
    c.width = window.innerWidth;

    const matrix = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%^&*()_+-=[]|;:,.<>?";
    const fontSize = 16;
    const columns = c.width / fontSize;

    const drops = [];
    for(let x = 0; x < columns; x++) drops = 1;

    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, c.width, c.height);

      ctx.fillStyle = '#0f0';
      ctx.font = fontSize + 'px monospace';

      for(let i = 0; i < drops.length; i++) {
        const text = matrix ;
        ctx.fillText(text, i*fontSize, drops *fontSize);

        if(drops *fontSize > c.height && Math.random() > 0.975) drops = 0;
        drops ++;
      }
    }

    setInterval(draw, 35);

    window.addEventListener('resize', () => {
      c.height = window.innerHeight;
      c.width = window.innerWidth;
    });
  </script>
</body>
</html>
